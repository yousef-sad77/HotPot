<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth Form</title>
  <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.min.css" />
  <script defer src="../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="./static/js/debug.js"></script>
  <style>
    :root {
      --valid-color: #198754;
      --invalid-color: #dc3545;
    }

    body {
      background: linear-gradient(to right, #6a11cb, #2575fc);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .auth-container {
      background: white;
      border-radius: 20px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.15);
    }

    .auth-container h2 {
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
    }

    input:valid {
      border-color: var(--valid-color);
    }

    input:invalid:focus {
      border-color: var(--invalid-color);
    }

    .toggle-btn {
      background-color: #2575fc;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      width: 100%;
      margin-top: 1rem;
      border-radius: 5px;
      transition: background-color 0.3s;
    }

    .toggle-btn:hover {
      background-color: #1e5fd2;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <h2 id="form-title">Sign In</h2>

    <!-- Sign In Form -->
    <form id="signin-form" class="auth-form active" novalidate>
      <div class="mb-3">
        <label for="signin-email" class="form-label">Email</label>
        <input type="email" class="form-control" id="signin-email" required />
      </div>
      <div class="mb-3">
        <label for="signin-password" class="form-label">Password</label>
        <input type="password" class="form-control" id="signin-password" required minlength="6" />
      </div>
      <button type="submit" class="btn btn-success w-100">Sign In</button>
    </form>

    <!-- Sign Up Form -->
    <form id="signup-form" class="auth-form" novalidate>
      <div class="mb-3">
        <label for="signup-email" class="form-label">Email</label>
        <input type="email" class="form-control" id="signup-email" required />
      </div>
      <div class="mb-3">
        <label for="signup-password" class="form-label">Password</label>
        <input type="password" class="form-control" id="signup-password" required minlength="6" />
      </div>
      <button type="submit" class="btn btn-primary w-100">Sign Up</button>
    </form>

    <!-- Toggle Button -->
    <button class="toggle-btn" id="toggle-btn">Switch to Sign Up</button>
  </div>

  <script>
    const toggleBtn = document.getElementById('toggle-btn');
    const signinForm = document.getElementById('signin-form');
    const signupForm = document.getElementById('signup-form');
    const title = document.getElementById('form-title');

    toggleBtn.addEventListener('click', () => {
      const isSignIn = signinForm.classList.contains('active');
      signinForm.classList.toggle('active');
      signupForm.classList.toggle('active');
      title.textContent = isSignIn ? 'Sign Up' : 'Sign In';
      toggleBtn.textContent = isSignIn ? 'Switch to Sign In' : 'Switch to Sign Up';
    });
  </script>
</body>
</html>
