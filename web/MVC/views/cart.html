<!-- Cart Content -->
<div class="container my-5">
  <h2 class="mb-4 text-center">Your Cart</h2>

  <!-- Cart Items -->
  <div class="row g-4">
    <div class="col-md-8">
      <ul class="list-group shadow">
        <!-- Example Item -->
        <li class="list-group-item d-flex justify-content-between align-items-center">
          <div class="d-flex align-items-center">
            <img src="./assets/images/chorizo-mozarella-gnocchi-bake-cropped.jpg" class="rounded me-3 w-75"
              alt="Meal Image" />
            <div>
              <h5 class="mb-1">Grilled Chicken</h5>
              <small class="text-muted">Served with veggies</small>
            </div>
          </div>
          <div class="text-end">
            <p class="mb-1">$12.99</p>

        <!-- Repeat similar items -->
        <!-- ... -->

            <span>Subtotal:</span>

          </p>
          <p class="d-flex justify-content-between mb-2">
            <span>Delivery:</span>
            <span>$3.00</span>
          </p>
          <p class="d-flex justify-content-between mb-2">
            <span>Tax:</span>
            <span>$2.60</span>
          </p>
          <hr />
          <h5 class="d-flex justify-content-between">
            <span>Total:</span>
            <span>$31.58</span>

          <button class="btn btn-success w-100 mt-3">Proceed to Checkout</button>
        </div>
      </div>

  </div>
